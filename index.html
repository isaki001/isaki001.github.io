<!DOCTYPE html>
<head>
	<style>
		p.solid {border-style: solid;}
		body {
        color: E0FFFF;
		}
	</style>
	<header>
	
	</header>

	<section>
	</section>

</head>

<body background-image: url(https://github.com/isaki001/isaki001.github.io/blob/master/back.jpg)>

	<form action="#" onsubmit="return false;">
		<input type="text" id="project"/>
		<button id="submit" onclick="goToProject()">Go</button>
	</form>


	<script type="text/javascript">

		var Liberal = document.createElement('p');
			Liberal.id = "Liberal";
			
		var Impartial = document.createElement('p');
			Impartial.id = "Impartial";
			
		var Conservative = document.createElement('p');
			Conservative.id = "Conservative";
			
		function goToProject(){
			var header = document.querySelector('header');
			var section = document.querySelector('section');
			var project = document.getElementById("project").value;
			
			var	requestURL = "http://localhost:9200/left2/_search?q=" + project;
			var	requestURL2 = "http://localhost:9200/impartial2/_search?q=" + project;
			var	requestURL3 = "http://localhost:9200/right2/_search?q=" + project;
			var	request = new XMLHttpRequest();
			
			request.open('GET', requestURL);
			request.responseType = 'json';
			request.send();
			request.onload = function() 
				{
					var pages = request.response;
					populateHeader(pages);
					document.body.appendChild(Liberal);
				}
				
			
			var request2 = new XMLHttpRequest();
			request2.open('GET', requestURL2);
			request2.responseType = 'json';
			request2.send();
			request2.onload = function() 
				{
					var pages = request2.response;
					populateHeader2(pages);
					
				}
				
			var request3 = new XMLHttpRequest();
			request3.open('GET', requestURL3);
			request3.responseType = 'json';
			request3.send();
			request3.onload = function() 
				{
					var pages = request3.response;
					populateHeader3(pages);
					
				}
				
		function populateHeader(jsonObj) 
		{
			while (Liberal.hasChildNodes()) {
				Liberal.removeChild(Liberal.lastChild);
			}
			var count = jsonObj.hits["total"];
			if(count>10)
				count = 10;
			Liberal.textContent = "LIBERAL NEWS (" + count + " Results)";
			
			if (count>10)
				count = 10;
			var i = 0;
			for(i=0; i<count; i++)
			{
				var title = document.createElement('p');
				title.className = "solid";
				title.textContent = 'Title: ' + jsonObj.hits.hits[i]._source["title"];
				Liberal.appendChild(title);
				
				var desc = document.createElement('p');
				desc.textContent = 'Description: ' + jsonObj.hits.hits[i]._source["desc"];
				title.appendChild(desc);
				
				var score = document.createElement('p');
				score.textContent = 'Score: ' + jsonObj.hits.hits[i]["_score"];
				title.appendChild(score);
				
				var temp_link = document.createElement("a");
				temp_link.href = jsonObj.hits.hits[i]._source["page"];
				temp_link.target = '_blank';
				temp_link.innerHTML = "link";
				title.appendChild(temp_link);
			}
		}
		
		function populateHeader2(jsonObj) 
		{
			document.body.appendChild(Impartial);
			while (Impartial.hasChildNodes()) {
				Impartial.removeChild(Impartial.lastChild);
			}
		
			var count = jsonObj.hits["total"];
			if(count>10)
				count = 10;
			Impartial.textContent = "IMPARTIAL NEWS (" + count + " Results)";
			
			if (count>10)
				count = 10;
			var i = 0;
			for(i=0; i<count; i++)
			{
				var title = document.createElement('p');
				title.className = "solid";
				title.textContent = 'Title: ' + jsonObj.hits.hits[i]._source["title"];
				Impartial.appendChild(title);
				
				var desc = document.createElement('p');
				desc.textContent = 'Description: ' + jsonObj.hits.hits[i]._source["desc"];
				title.appendChild(desc);
				
				var score = document.createElement('p');
				score.textContent = 'Score: ' + jsonObj.hits.hits[i]["_score"];
				title.appendChild(score);
				
				var temp_link = document.createElement("a");
				temp_link.href = jsonObj.hits.hits[i]._source["page"];
				temp_link.target = '_blank';
				temp_link.innerHTML = "link";
				title.appendChild(temp_link);
			}
		}
		
		function populateHeader3(jsonObj) 
		{
			document.body.appendChild(Conservative);
			while (Conservative.hasChildNodes()) {
				Conservative.removeChild(Conservative.lastChild);
			}
			var count = jsonObj.hits["total"];
			if(count>10)
				count = 10;
			Conservative.textContent = "CONSERVATIVE NEWS (" + count + " Results)";
			
			if (count>10)
				count = 10;
			var i = 0;
			for(i=0; i<count; i++)
			{
				var title = document.createElement('p');
				title.className = "solid";
				title.textContent = 'Title: ' + jsonObj.hits.hits[i]._source["title"];
				Conservative.appendChild(title);
				
				var desc = document.createElement('p');
				desc.textContent = 'Description: ' + jsonObj.hits.hits[i]._source["desc"];
				title.appendChild(desc);
				
				var score = document.createElement('p');
				score.textContent = 'Score: ' + jsonObj.hits.hits[i]["_score"];
				title.appendChild(score);
				
				var temp_link = document.createElement("a");
				temp_link.href = jsonObj.hits.hits[i]._source["page"];
				temp_link.target = '_blank';
				temp_link.innerHTML = "link";
				title.appendChild(temp_link);
			}
		}
		
    }
	</script>


</body>
